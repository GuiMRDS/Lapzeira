<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapzeira - O Futuro da Escrita</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'display': ['"Space Grotesk"', 'sans-serif'],
                        'body': ['"Inter"', 'sans-serif'],
                        'mono': ['"Space Mono"', 'monospace'],
                    },
                    colors: {
                        ds: {
                            light: '#F5F4F3',
                            white: '#FFFFFF',
                            black: '#000000',
                            gray: '#666666',
                            purple: '#D2C5FF',
                            green: '#345C59',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- GSAP & Lenis -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- SplitType -->
    <script src="https://unpkg.com/split-type"></script>

    <style>
        body {
            background-color: #F5F4F3;
            color: #000000;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* Hide scrollbar for cleaner look like Apple */
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        body::-webkit-scrollbar {
            display: none;
        }

        .bg-grid-pattern {
            background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.05) 1px, transparent 0);
            background-size: 32px 32px;
        }

        /* Glass Panel from DS */
        .glass-panel-light {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.02);
        }

        /* Flashlight Effect */
        .flashlight-card { position: relative; overflow: hidden; }
        .flashlight-card::before {
            content: "";
            position: absolute;
            inset: 0px;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(255, 255, 255, 0.6), transparent 40%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 2;
            mix-blend-mode: overlay;
        }
        .flashlight-card:hover::before { opacity: 1; }

        /* Noise Overlay for Cinematic Feel */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.25;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            mix-blend-mode: multiply;
        }

        /* Split Type Essential Classes */
        .line { overflow: hidden; padding-bottom: 0.1em; margin-bottom: -0.1em; }
        .word { transform: translateY(110%); opacity: 0; }

        /* Video Mask (Linear gradient blur effect on edges) */
        .video-wrapper {
            mask-image: radial-gradient(circle at center, black 60%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 60%, transparent 100%);
        }

        /* Scroll Progress Bar */
        .progress-bar {
            transform-origin: 0% 50%;
        }

        /* Custom glow drop shadow for product container */
        .glow-shadow {
            box-shadow: 0 0 120px rgba(52, 92, 89, 0.15);
        }
    </style>
</head>
<body class="font-body selection:bg-black selection:text-white">

    <div class="noise-overlay"></div>

    <!-- Scroll Track (controls the video duration, massive height to allow scrubbing) -->
    <div id="scroll-container" class="h-[400vh] relative w-full bg-ds-light">
        
        <!-- Pinned Hero Stage (Always in view while scrolling the container) -->
        <div id="hero-stage" class="sticky top-0 w-full h-screen overflow-hidden flex items-center">
            
            <div class="absolute inset-0 bg-grid-pattern opacity-40 pointer-events-none"></div>

            <!-- Soft Glows from Design System -->
            <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-ds-purple rounded-full blur-[120px] opacity-20 animate-pulse pointer-events-none"></div>
            <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-ds-green rounded-full blur-[120px] opacity-10 animate-pulse pointer-events-none" style="animation-delay: 2s;"></div>

            <div class="container mx-auto px-6 lg:px-12 h-full flex flex-col md:flex-row items-center justify-between relative z-10">
                
                <!-- Left Content -->
                <div class="w-full md:w-5/12 flex flex-col justify-center h-full pt-20 md:pt-0" id="content-col">
                    
                    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-black/10 bg-white/50 backdrop-blur-sm mb-8 w-fit glass-panel-light" id="badge">
                        <span class="w-2 h-2 rounded-full bg-black animate-pulse"></span>
                        <span class="text-xs font-mono font-bold tracking-widest uppercase text-black/70">Next Gen Precision</span>
                    </div>

                    <h1 class="font-display text-5xl md:text-7xl lg:text-[90px] xl:text-[110px] font-bold leading-[0.9] tracking-tighter mb-6 text-black" id="hero-title">
                        Reinventando a Escrita.
                    </h1>

                    <p class="font-body text-lg md:text-xl text-black/60 max-w-md mb-12" id="hero-subtitle">
                        Mecanismo de avanço contínuo. Equilíbrio perfeito. O fluxo ininterrupto das suas melhores ideias materializado em alumínio aeroespacial.
                    </p>

                    <div class="flex flex-wrap gap-4 lg:gap-6 items-center" id="cta-group">
                        <!-- Primary Button (Beam effect from DS) -->
                        <button class="group relative flex items-center justify-center overflow-hidden rounded-full font-medium shadow-lg hover:scale-105 transition-transform duration-500">
                            <span class="absolute inset-[-1000%] animate-[spin_3s_linear_infinite] bg-[conic-gradient(from_90deg_at_50%_50%,#F5F4F3_0%,#000000_50%,#F5F4F3_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500"></span>
                            <span class="relative flex h-full w-full items-center justify-center rounded-full bg-black px-8 py-4 m-[1px] text-white hover:bg-white hover:text-black transition-colors duration-500">
                                <span class="text-xs tracking-widest uppercase font-bold mr-3">Comprar Agora</span>
                                <iconify-icon icon="solar:arrow-right-up-linear" class="text-xl group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></iconify-icon>
                            </span>
                        </button>

                        <!-- Secondary Button -->
                        <button class="group flex items-center justify-center rounded-full px-8 py-4 border border-black bg-transparent hover:bg-black hover:text-white transition-all duration-300">
                            <span class="text-xs tracking-widest uppercase font-bold text-inherit">Ver Detalhes</span>
                        </button>
                    </div>

                    <!-- Scroll Indicator -->
                    <div class="mt-16 md:mt-24 flex items-center gap-4 opacity-50" id="scroll-indicator">
                        <span class="text-[10px] uppercase tracking-[0.2em] font-mono text-black font-bold">Scroll para Explorar</span>
                        <div class="w-16 h-[2px] bg-black/10 overflow-hidden relative rounded-full">
                            <div class="absolute left-0 top-0 h-full bg-black w-full scale-x-0 progress-bar rounded-full"></div>
                        </div>
                    </div>

                </div>

                <!-- Right Content (Video Parallax) -->
                <div class="w-full md:w-7/12 h-[50vh] md:h-[85vh] relative flex items-center justify-center lg:justify-end mt-12 md:mt-0" id="video-col">
                    
                    <!-- Glass Container for Video -->
                    <div class="relative w-full max-w-[800px] aspect-[4/5] md:aspect-auto md:h-full flashlight-card rounded-[2.5rem] overflow-hidden glass-panel-light p-2 lg:p-4 glow-shadow transform-gpu" onmousemove="handleMouseMove(event, this)">
                        
                        <div class="w-full h-full rounded-[2rem] overflow-hidden relative bg-black/5 video-wrapper">
                            <!-- Local Video (Scrubbed by scroll) -->
                            <video 
                                id="product-video"
                                src="raw_files/Video1.mp4" 
                                class="w-full h-full object-cover transform scale-[1.02]"
                                muted 
                                playsinline 
                                preload="auto"
                            ></video>
                        </div>
                        
                        <!-- Internal subtle shadow for depth -->
                        <div class="absolute inset-0 shadow-[inset_0_0_80px_rgba(255,255,255,0.5)] pointer-events-none rounded-[2.5rem]"></div>
                        <!-- Border highlight -->
                        <div class="absolute inset-0 border border-white/40 rounded-[2.5rem] pointer-events-none"></div>
                    </div>
                    
                </div>

            </div>
        </div>
    </div>

    <!-- Spacer to allow scrolling past the hero (Proof of concept) -->
    <section class="h-[50vh] bg-ds-light flex flex-col items-center justify-center text-black border-t border-black/5 relative z-20">
        <span class="text-xs uppercase tracking-[0.25em] font-mono text-black/40 mb-4">A Experiência</span>
        <h2 class="font-display text-4xl md:text-5xl font-bold tracking-tight">O Fim da Interrupção.</h2>
    </section>

    <script>
        // --- 1. LENIS SMOOTH SCROLL ---
        const lenis = new Lenis({
            duration: 1.5, // Super smooth and slow for cinematic feel
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // Apple-like easing
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 0.8, // Slightly heavier scroll
            smoothTouch: false,
            touchMultiplier: 2,
        });

        // Integrate Lenis with GSAP ScrollTrigger
        lenis.on('scroll', ScrollTrigger.update);

        gsap.ticker.add((time) => {
            lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0);

        // --- 2. TEXT ANIMATION PREP (SplitType) ---
        const titleText = new SplitType('#hero-title', { types: 'lines, words' });
        const subtitleText = new SplitType('#hero-subtitle', { types: 'lines, words' });

        // --- 3. INITIAL REVEAL ANIMATION (GSAP) ---
        gsap.registerPlugin(ScrollTrigger);

        // Hide elements initially to avoid flash
        gsap.set('.word', { y: '120%', opacity: 0 });
        gsap.set(['#badge', '#cta-group', '#scroll-indicator'], { y: 30, opacity: 0 });
        gsap.set('#video-col', { x: 80, opacity: 0, scale: 0.95 });

        // Timeline for Entrance
        const tlIntro = gsap.timeline({ defaults: { ease: "power4.out" } });

        tlIntro.to('.word', {
            y: '0%',
            opacity: 1,
            duration: 1.4,
            stagger: 0.04,
            delay: 0.2
        })
        .to('#badge', { y: 0, opacity: 1, duration: 1 }, "-=1.2")
        .to('#cta-group', { y: 0, opacity: 1, duration: 1 }, "-=1.0")
        .to('#scroll-indicator', { y: 0, opacity: 0.5, duration: 1 }, "-=0.8")
        .to('#video-col', { 
            x: 0, 
            opacity: 1, 
            scale: 1, 
            duration: 1.8, 
            ease: "expo.out" 
        }, "-=1.5");

        // --- 4. VIDEO SCRUBBING & PARALLAX LOGIC ---
        const video = document.getElementById('product-video');
        
        // We need the video metadata loaded to know its total duration
        function setupVideoScrubbing() {
            const duration = video.duration || 5; // fallback duration if not available instantly

            let tlScroll = gsap.timeline({
                scrollTrigger: {
                    trigger: "#scroll-container",
                    start: "top top", // When top of container hits top of viewport
                    end: "bottom bottom", // When bottom of container hits bottom of viewport
                    scrub: 1.2, // Scrub lag for buttery smooth interpolation (Cinematic feel)
                    onUpdate: (self) => {
                        // Update the tiny scroll progress bar
                        gsap.to('.progress-bar', { scaleX: self.progress, duration: 0.1, overwrite: "auto" });
                    }
                }
            });

            // 4a. Scrub Video Time
            tlScroll.fromTo(video, 
                { currentTime: 0 },
                { currentTime: duration, ease: "none" },
                0
            );

            // 4b. Text Parallax (Text moves up and fades out slightly as you scroll down)
            tlScroll.to('#content-col', {
                y: -150,
                opacity: 0, // Fades completely by the end of the scroll
                ease: "power1.inOut"
            }, 0);

            // 4c. Video Container Parallax (Scales up and centers)
            tlScroll.to('#video-col', {
                scale: 1.05,
                y: 50,
                ease: "power1.inOut"
            }, 0);
        }

        // Wait for metadata to ensure video duration is known
        if (video.readyState >= 1) {
            setupVideoScrubbing();
        } else {
            video.addEventListener('loadedmetadata', setupVideoScrubbing);
            // Force load attempt (helps on mobile Safari)
            video.load();
        }

        // --- 5. FLASHLIGHT MOUSE EFFECT (From Design System) ---
        function handleMouseMove(e, element) {
            const rect = element.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            element.style.setProperty('--mouse-x', `${x}px`);
            element.style.setProperty('--mouse-y', `${y}px`);
        }
    </script>
</body>
</html>
